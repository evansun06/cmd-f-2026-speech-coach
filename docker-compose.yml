services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      - MEDIA_ROOT=${MEDIA_ROOT:-/app/media}
      - MEDIA_URL=${MEDIA_URL:-/media/}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A config worker -l ${CELERY_WORKER_LOGLEVEL:-info} -E
    env_file:
      - .env
    environment:
      - MEDIA_ROOT=${MEDIA_ROOT:-/app/media}
      - MEDIA_URL=${MEDIA_URL:-/media/}
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  flower:
    image: mher/flower
    command: celery --broker=${CELERY_BROKER_URL} flower --port=${FLOWER_PORT:-5555} --basic-auth=${FLOWER_BASIC_AUTH}
    env_file:
      - .env
    ports:
      - "${FLOWER_PORT:-5555}:${FLOWER_PORT:-5555}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine 
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PUBLISHED_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  backend_media:
  frontend_node_modules:
  postgres_data:
  redis_data:
